services:
  # Main Claude agent container
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - LLM_MODEL=${LLM_MODEL:?Set LLM_MODEL in .env}
    # Container name includes instance for uniqueness (optional override)
    container_name: ${CONTAINER_PREFIX:-claude}-agent-${INSTANCE_NAME:-default}

    # Port mappings - configurable via PORT_PREFIX for multi-instance
    # PORT_PREFIX is a single digit prepended to container port
    # Default prefix is 2, so: 3000->23000, 5000->25000, 8000->28000, 8080->28080
    # Set PORT_PREFIX=3 for second instance: 3000->33000, etc.
    ports:
      - "${PORT_PREFIX:-2}3000:3000"   # Node.js/React (default 23000)
      - "${PORT_PREFIX:-2}5000:5000"   # Flask (default 25000)
      - "${PORT_PREFIX:-2}8000:8000"   # Django/FastAPI (default 28000)
      - "${PORT_PREFIX:-2}8080:8080"   # General web (default 28080)

    # Environment variables for local LLM
    environment:
      - ANTHROPIC_BASE_URL=http://${LLM_HOST:?Set LLM_HOST in .env}:${LLM_PORT:-11234}
      - ANTHROPIC_AUTH_TOKEN=${LLM_AUTH_TOKEN:-lmstudio}
      # Disable extended thinking (local LLMs don't support it)
      - MAX_THINKING_TOKENS=0
      # SearXNG web search URL (run 'make searxng-start' on host)
      - SEARXNG_URL=${SEARXNG_URL:-http://host.docker.internal:8888}
      # Vision model config (defaults to same backend as LLM, can override)
      - VISION_API_URL=http://${VISION_HOST:-${LLM_HOST}}:${VISION_PORT:-${LLM_PORT:-11234}}
      - VISION_API_TOKEN=${VISION_AUTH_TOKEN:-${LLM_AUTH_TOKEN:-lmstudio}}
      - VISION_MODEL=${VISION_MODEL:-qwen/qwen3-vl-4b}
      - HOME=/home/claude
      - TERM=xterm-256color
      # Tracing (Langfuse) - set TRACE_TO_LANGFUSE=true in .env to enable
      - TRACE_TO_LANGFUSE=${TRACE_TO_LANGFUSE:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://host.docker.internal:3000}
      - LANGFUSE_PROJECT=${LANGFUSE_PROJECT:-claude-code}
      - LANGFUSE_DEBUG=${LANGFUSE_DEBUG:-false}
      # Supervisor URL - default to standalone supervisor on host
      # Use SUPERVISOR_URL=http://supervisor:8080 with SUPERVISOR=1 for embedded mode
      - SUPERVISOR_URL=${SUPERVISOR_URL:-http://host.docker.internal:8080}
      - SUPERVISOR_TIMEOUT=${SUPERVISOR_TIMEOUT:-3600}
      # Extra seconds added for Langfuse work; Claude Stop hook timeout = SUPERVISOR_TIMEOUT + this
      - STOP_HOOK_EXTRA_SEC=${STOP_HOOK_EXTRA_SEC:-1200}
      # Append autonomous-work nudge to supervisor NOT_COMPLETE feedback (hook)
      - SUPERVISOR_AUTONOMY_APPEND=${SUPERVISOR_AUTONOMY_APPEND:-true}
      # Initial task (passed from run.sh)
      - ORIGINAL_TASK=${ORIGINAL_TASK:-}
      # Instance identification (for logging/tracing)
      - INSTANCE_NAME=${INSTANCE_NAME:-default}
      # Workspace name (for supervisor API - shared mode)
      - WORKSPACE_NAME=${WORKSPACE_NAME:-default}

    # Volume mounts - only workspace, no config mounts
    volumes:
      # Main workspace - use WORKSPACE_PATH env var for custom location
      # Set WORKSPACE_BASE in .env to use internal drive (avoid exFAT issues)
      - ${WORKSPACE_PATH:-./workspaces/default}:/home/claude/workspace
      # Immutable task storage (read-only - neither agent nor supervisor can modify)
      - ${TASK_STORAGE:-./workspaces/default-task}:/task:ro

    # Keep container running for interactive use
    stdin_open: true
    tty: true

    # Network for communication with supervisor and searxng
    networks:
      - agentnet

    # Linux compatibility for host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Resource limits
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-16G}
        reservations:
          memory: ${MEMORY_RESERVATION:-2G}

    # NOTE: Supervisor is now a shared standalone service (make supervisor-start)
    # To include supervisor in this stack instead, use: SUPERVISOR=1 make run ...

  # Embedded Supervisor (optional - only starts with SUPERVISOR=1 / --profile supervisor)
  # For most cases, use the shared supervisor: make supervisor-start
  supervisor:
    profiles:
      - supervisor  # Only starts when profile is active
    build:
      context: ./supervisor
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-claude}-supervisor-${INSTANCE_NAME:-default}

    # Expose supervisor port for remote access
    # Default: 8080 (use SUPERVISOR_PORT_OFFSET for multiple supervisors)
    ports:
      - "${SUPERVISOR_EXTERNAL_PORT:-8080}:8080"

    # Environment variables
    environment:
      # LLM configuration - can be different from agent (e.g., different host)
      - ANTHROPIC_BASE_URL=http://${SUPERVISOR_LLM_HOST:-${LLM_HOST}}:${SUPERVISOR_LLM_PORT:-${LLM_PORT:-11234}}
      - ANTHROPIC_AUTH_TOKEN=${SUPERVISOR_LLM_AUTH_TOKEN:-${LLM_AUTH_TOKEN:-lmstudio}}
      - LLM_MODEL=${SUPERVISOR_LLM_MODEL:-${LLM_MODEL:-}}
      # Disable extended thinking (local LLMs don't support it)
      - MAX_THINKING_TOKENS=0
      # Vision model config (same as agent - for screenshot analysis)
      - VISION_API_URL=http://${SUPERVISOR_LLM_HOST:-${LLM_HOST}}:${SUPERVISOR_LLM_PORT:-${LLM_PORT:-11234}}
      - VISION_API_TOKEN=${SUPERVISOR_LLM_AUTH_TOKEN:-${LLM_AUTH_TOKEN:-lmstudio}}
      - VISION_MODEL=${VISION_MODEL:-qwen/qwen3-vl-4b}
      # Supervisor settings
      - WORKSPACE_PATH=/workspace
      - SUPERVISOR_WORKSPACES=/supervisor-workspaces
      - TASK_STORAGE=/task
      - SUPERVISOR_MAX_LOOPS=${SUPERVISOR_MAX_LOOPS:-20}
      - SUPERVISOR_TIMEOUT=${SUPERVISOR_TIMEOUT:-3600}
      # Supervisor's own Langfuse tracing (separate project)
      - SUPERVISOR_TRACE_TO_LANGFUSE=${SUPERVISOR_TRACE_TO_LANGFUSE:-false}
      - SUPERVISOR_LANGFUSE_PUBLIC_KEY=${SUPERVISOR_LANGFUSE_PUBLIC_KEY:-}
      - SUPERVISOR_LANGFUSE_SECRET_KEY=${SUPERVISOR_LANGFUSE_SECRET_KEY:-}
      - SUPERVISOR_LANGFUSE_PROJECT=${SUPERVISOR_LANGFUSE_PROJECT:-claude-supervisor}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://host.docker.internal:3000}
      - LANGFUSE_DEBUG=${LANGFUSE_DEBUG:-false}
      # Agent's Langfuse credentials (for supervisor to review agent traces)
      - AGENT_LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - AGENT_LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - AGENT_LANGFUSE_PROJECT=${LANGFUSE_PROJECT:-claude-code}
      # Instance identification
      - INSTANCE_NAME=${INSTANCE_NAME:-default}

    # Volume mounts
    volumes:
      # Agent workspace (read-only for evaluation)
      - ${WORKSPACE_PATH:-./workspaces/default}:/workspace:ro
      # Supervisor's own workspaces (for turn isolation)
      - ${SUPERVISOR_WORKSPACES:-./workspaces/supervisor}:/supervisor-workspaces
      # Immutable task storage (read-only - neither agent nor supervisor can modify)
      - ${TASK_STORAGE:-./workspaces/default-task}:/task:ro

    # Network for communication with agent
    networks:
      - agentnet

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Resource limits (supervisor runs Claude CLI)
    deploy:
      resources:
        limits:
          memory: ${SUPERVISOR_MEMORY_LIMIT:-4G}
        reservations:
          memory: ${SUPERVISOR_MEMORY_RESERVATION:-1G}

# SearXNG web search service (optional but recommended)
  # Start separately with: make searxng-start
  # Or include here by setting INCLUDE_SEARXNG=true
  searxng:
    image: searxng/searxng:latest
    container_name: ${CONTAINER_PREFIX:-claude}-searxng-${INSTANCE_NAME:-default}
    profiles:
      - searxng  # Only starts when profile is active
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    networks:
      - agentnet
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  agentnet:
    driver: bridge
