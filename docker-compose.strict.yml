# Hardening Level: STRICT (default)
# Maximum config protection - agent cannot modify any Claude Code configuration
# Use case: Production autonomous runs, untrusted tasks, security-sensitive environments
#
# All hooks, skills, agents, CLAUDE.md, and settings are read-only (kernel-enforced)
# See: docs/HARDENING_LEVELS.md

services:
  agent:
    volumes:
      # =========================================================================
      # STRICT HARDENING: All config files locked
      # Agent cannot modify, delete, or replace these (kernel-enforced via bind mounts)
      # =========================================================================

      # Hook scripts (all hooks locked)
      - ./hooks-backup:/home/claude/.claude/hooks:ro

      # Skills directory (all skills locked - prevents supervisor tampering)
      - ./skills-backup:/home/claude/.claude/skills:ro

      # Agents directory (all agents locked - prevents qa-agent tampering)
      - ./agents-backup:/home/claude/.claude/agents:ro

      # Source CLAUDE.md in ~/.claude (behavioral instructions)
      - ./claude-backup/CLAUDE.md:/home/claude/.claude/CLAUDE.md:ro

      # Workspace CLAUDE.md (behavioral instructions)
      - ${WORKSPACE_PATH:-./workspaces/default}/CLAUDE.md:/home/claude/workspace/CLAUDE.md:ro

      # Project-level settings with hooks config (generated by run.sh)
      - ${WORKSPACE_PATH:-./workspaces/default}/.claude/settings.json:/home/claude/workspace/.claude/settings.json:ro

      # User-level settings (prevents adding env vars or changing deny list)
      - ${WORKSPACE_PATH:-./workspaces/default}/.claude/user-settings.json:/home/claude/.claude/settings.json:ro
