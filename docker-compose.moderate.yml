# Hardening Level: MODERATE
# Guardrails locked, but agent can create/modify other tools
# Use case: Trusted tasks where agent creativity is valuable, development with safety nets
#
# Locked: stop hook, image hook, supervisor skill, qa-agent, CLAUDE.md files, settings
# Writable: other skills (vision, browser, etc.), other agents (debugger, worker, etc.)
# See: docs/HARDENING_LEVELS.md

services:
  agent:
    volumes:
      # =========================================================================
      # MODERATE HARDENING: Guardrails locked, other tools writable
      # Agent can modify non-critical skills/agents but cannot bypass completion validation
      # =========================================================================

      # Hook scripts (all hooks are guardrails - both locked)
      - ./hooks-backup:/home/claude/.claude/hooks:ro

      # Supervisor skill only (completion validation - critical guardrail)
      - ./skills-backup/supervisor:/home/claude/.claude/skills/supervisor:ro

      # Workflow skill (state machine - works with supervisor)
      - ./skills-backup/workflow:/home/claude/.claude/skills/workflow:ro

      # QA agent only (test verification - critical guardrail)
      - ./agents-backup/qa-agent.md:/home/claude/.claude/agents/qa-agent.md:ro

      # Source CLAUDE.md in ~/.claude (behavioral instructions)
      - ./claude-backup/CLAUDE.md:/home/claude/.claude/CLAUDE.md:ro

      # Workspace CLAUDE.md (behavioral instructions)
      - ${WORKSPACE_PATH:-./workspaces/default}/CLAUDE.md:/home/claude/workspace/CLAUDE.md:ro

      # Project-level settings with hooks config (generated by run.sh)
      - ${WORKSPACE_PATH:-./workspaces/default}/.claude/settings.json:/home/claude/workspace/.claude/settings.json:ro

      # User-level settings (prevents adding env vars or changing deny list)
      - ${WORKSPACE_PATH:-./workspaces/default}/.claude/user-settings.json:/home/claude/.claude/settings.json:ro
